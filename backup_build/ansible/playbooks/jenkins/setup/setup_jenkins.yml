- name: Install Blue Ocean plugin in Jenkins running on Docker
  hosts: buildserver
  become: true
  vars_files:
    - /vagrant/ansible/playbooks/jenkins/vault/vault.yml
    - ../../vars/main.yml
  vars:
    jenkins_host: "{{jenkins_host}}"
    jenkins_port: "{{jenkins_port}}"
    jenkins_home: "{{jenkins_home}}"
  tasks:
    - name: Create Jenkins home and plugins directories
      file:
        path: "{{ jenkins_home }}/plugins"
        state: directory
        mode: '0755'

    - name: Wait for Jenkins to be ready
      uri:
        url: "http://{{ jenkins_host }}:{{ jenkins_port }}/login"
        method: GET
        return_content: no
      register: jenkins_status
      retries: 10
      delay: 10
      until: jenkins_status.status == 200
      ignore_errors: yes

    - name: Install Blue Ocean plugin
      jenkins_plugin:
        name: blueocean
        state: present
        url: "http://{{ jenkins_host }}:{{ jenkins_port }}"
        url_username: "{{ jenkins_username }}"
        url_password: "{{ jenkins_password }}"
        jenkins_home: "{{ jenkins_home }}"
      become: true

    - name: Restart Jenkins Docker container
      command: docker restart jenkins
      register: restart_result

    - name: Wait for Jenkins to be available after restart
      uri:
        url: "http://{{ jenkins_host }}:{{ jenkins_port }}/login"
        method: GET
        return_content: no
      register: jenkins_restart_status
      retries: 10
      delay: 10
      until: jenkins_restart_status.status == 200
      ignore_errors: yes
