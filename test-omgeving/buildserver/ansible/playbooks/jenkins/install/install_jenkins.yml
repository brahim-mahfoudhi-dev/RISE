- name: Install Jenkins
  hosts: buildserver
  become: yes
  vars_files:
    - ../../vars/main.yml
  tasks:
    - name: Add Jenkins GPG key
      apt_key:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        state: present

    - name: Add Jenkins repository to sources list
      apt_repository:
        repo: 'deb https://pkg.jenkins.io/debian-stable binary/'
        state: present

    - name: Update APT cache
      apt:
        update_cache: yes

    - name: Install Jenkins and OpenJDK 17
      ansible.builtin.apt:
        name:
          - openjdk-17-jdk
          - jenkins
        state: present

    - name: Ensure Jenkins is enabled and started
      ansible.builtin.systemd:
        name: jenkins
        enabled: true
        state: started

    - name: Set defaults for Jenkins
      ansible.builtin.template:
        src: ../files/jenkins_default
        dest: /var/lib/jenkins/jenkins.install.UpgradeWizard.state

    - name: Disable Jenkins setup wizard
      ansible.builtin.lineinfile:
        path: /etc/default/jenkins
        regexp: '^JAVA_OPTS='
        line: 'JAVA_OPTS="-Djenkins.install.runSetupWizard=false"'
        create: yes
    
    - name: Wait for Jenkins to be fully available
      wait_for:
        host: localhost
        port: 8080
        delay: 10
        timeout: 300
        state: started

    
    - name: Get the jenkins plugins
      get_url:
        url: http://localhost:8080/jnlpJars/jenkins.cli.jar
        dest: /root/jenkins-cli.jar


    - name: install Plugins
      shell: java -jar /root/jenkins-cli.jar -s http://localhost:8080 -auth @/root/jenkinsauth install-plugin greenballs github cloudbees-folder dashboard-view configuration-as-code build-timeout rebuild ssh-agent timestamper ws-cleanup github repo ssh-slaves email-ext mailer workflow-aggregator


    - name: Restart Jenkins
      ansible.builtin.systemd:
        name: jenkins
        state: restarted

    - name: Wait for Jenkins to be available
      wait_for:
        host: "{{ inventory_hostname }}"
        port: "{{ jenkins_port }}"
        delay: 10
        timeout: 300
        state: started