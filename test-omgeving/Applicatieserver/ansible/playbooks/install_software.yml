---
- name: Update system and install required software
  hosts: app
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Check if updates have already been applied
      stat:
        path: /var/run/apt_updated
      register: apt_updated

    - name: Update apt cache
      apt:
        update_cache: yes
      when: not apt_updated.stat.exists

    - name: Upgrade all apt packages
      apt:
        name: "*"
        state: latest
      when: not apt_updated.stat.exists

    - name: Create a marker file after apt update and upgrade
      file:
        path: /var/run/apt_updated
        state: touch
      when: not apt_updated.stat.exists

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Ensure the .NET 6.0 packages are installed
      apt:
        name:
          - dotnet-runtime-6.0
          - dotnet-sdk-6.0
          - dotnet-targeting-pack-6.0
          - dotnet-templates-6.0
          - dotnet-hostfxr-6.0
        state: present
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Install pip if not already installed
      ansible.builtin.package:
        name: python3-pip
        state: present

    - name: Install requests using pip
      ansible.builtin.pip:
        name: requests
        executable: /usr/bin/pip3
