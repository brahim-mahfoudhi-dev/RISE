- name: Install Jenkins plugins
  hosts: buildserver
  become: true
  vars_files:
    - ../../vars/main.yml
    - "{{ secrets_path }}"
  tasks:
    - name: Wait for Jenkins to be ready
      uri:
        url: "http://{{ jenkins_host }}:{{ jenkins_port }}/login"
        method: GET
        return_content: no
      register: jenkins_status
      retries: 10
      delay: 10
      until: jenkins_status.status == 200
      ignore_errors: yes


    - name: Install Jenkins plugins
      jenkins_plugin:
        name: "{{ item }}"
        state: present
        url: "{{ jenkins_url}}"
        url_username: "{{ jenkins_username }}"
        url_password: "{{ jenkins_password }}"
        jenkins_home: "{{ jenkins_home }}"
      loop:
        - blueocean
        - instance-identity
        - github
        - dashboard-view
        - configuration-as-code
        - build-timeout
        - rebuild
        - ssh-agent
        - timestamper
        - ws-cleanup
        - github-repo
        - ssh-slaves
        - email-ext
        - mailer
        - workflow-aggregator
        - discord-notifier
        - html-publisher
        - coverage
        - cobertura
        - performance
        - test-results-analyzer
        - jenkinslint
      register: jenkins_plugin_result
      retries: 3
      delay: 10
      until: jenkins_plugin_result is succeeded

    - name: Restart Jenkins
      systemd:
        name: jenkins
        state: restarted